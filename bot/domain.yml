version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - schedule_meeting
  - cancel_meeting
  - check_schedule
  - track_booking
  - bot_challenge
  - stop

responses:
  utter_greet:
  - text: "Hello! I am your AI assistant. How can I help you today?"

  utter_goodbye:
  - text: "Goodbye! Have a great day."

  utter_iamabot:
  - text: "I am an AI assistant powered by Rasa."

  utter_ask_meeting_details:
  - text: "Sure, who would you like to schedule a meeting with, and what time?"

  utter_meeting_scheduled:
  - text: "I have added that meeting to your schedule."

  utter_ask_cancel_details:
  - text: "Which meeting would you like me to cancel?"

  utter_meeting_cancelled:
  - text: "I have cancelled that meeting."
  
  utter_check_schedule:
  - text: "Here is what you have scheduled for today."

  utter_track_booking:
  - text: "I can help you track your booking. Can you provide your booking reference number?"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
